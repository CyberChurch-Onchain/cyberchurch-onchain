steps:
  # Step 1: Log the start of the build environment
  - name: 'gcr.io/cloud-builders/git'
    args: ['version']

  # Step 2: Run your automated build step or asset compilation
  # (We will swap this runner image out depending on your preferred Unity version/license parameters)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Starting Unity build pipeline for CyberChurch..."
        # Add your specific Unity compilation paths or deployment triggers here

  # Step 3: Deploy WebGL build artifacts to Firebase Hosting
  - name: 'us-docker.pkg.dev/firebase-cli/us/firebase'
    args: ['deploy', '--project=bold-ally-485107-b8', '--only=hosting']


options:
  logging: CLOUD_LOGGING_ONLY